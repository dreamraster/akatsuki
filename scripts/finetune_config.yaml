# Qwen-0.6B QLoRA Fine-tuning Configuration
# Optimized for 4GB VRM constraint

# ============
# Model Settings
# ============
model:
  name_or_path: "Qwen/Qwen-0_6B"
  trust_remote_code: true
  low_cpu_mod_loading: false

# ============
# QLoRA Configuration
# ============
qlora:
  # Bitandbytes quantization config
  load_in_4bit: true
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"

  # LoRA configuration
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# ============
# Training Configuration
# ========================
train:
  # Batch size for training
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 1

  # Gradient accumulation steps for effective batch size
  gradient_accumulation_steps: 4

  # Optimizer settings
  optim: "adamw_torch"
  learning_rate: 0.0002
  max_grad_norm: 0.3
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-07

  # Learning rate schedule
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  warmup_steps: 100

  # Training duration
  num_train_epochs: 3

  # Logging
  logging_dir: "./logs"
  logging_steps: 10
  logging_first_step: true

  # Evaluation
  evaluation_strategy: "steps"
  eval_steps: 500
  eval_delay: null

  # Save checkpoint settings
  save_strategy: "epoch"
  save_total_limit: 3
  save_safetensors: true

  # Mixed precision training
  fp16: false
  bf16: true
  bfloat16: true
  half_precision_topk_for_serial_embedding: false

  # Other
  seed: 42
  dataloader_seed: 42
  dataloader_drop_last: true

# ========================
# Data Configuration
# =========================
data:
  dataset_name: "techedata/CodeAlpaca-20k"
  dataset_split: "train"
  max_seq_length: 2048
  chat_template: "qwen"

  # Dataset loading config
  preprocessing_num_workers: 4
  remove_unused_columns: true

# ========================
# LoRA Target Modules
# Qwen specific target modules
# =========================
lora:
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    - wte
    - wpe
    - lm_head
    - c_attn
    - c_proj

  # Modules to freeze in the base model
  modules_to_save: []

# ========================
# Training Run Settings
# ========================
training_run:
  run_name: "qwen-0.6b-lora-finetune"
  output_dir: "./checkpoints/qwen-0.6b-lora"
  report_to: "none"

  # Logging
  logging_strategy: "steps"
  logging_steps: 10
  logging_first_step: true

  # Evaluation and save
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  save_only_model: false

# ========================
# Inference Settings
# =========================
inference:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
  num_beams: 1
  no_repeat_ngram_size: 4
  early_stopping: true
